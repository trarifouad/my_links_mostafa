<head>

<title>GetPro — All Premium Upgrades in One Place</title>

<style>
  :root{
    --bg:#060a14;
    --bg-2:#0b1120;
    --panel:rgba(17,24,42,.72);
    --panel-edge:rgba(212,175,55,.28);
    --gold:#d4af37;
    --gold-light:#f6e7ac;
    --gold-deep:#8f6f1c;
    --silver:#e3e8f0;
    --silver-dim:#aeb6c6;
    --purple:#8b5cf6;
    --purple-glow:rgba(139,92,246,.55);
    --text:#e9ecf4;
    --muted:#8b93a7;
    --radius:18px;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:"Tajawal","Outfit",system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
    overflow-x:hidden;
    position:relative;
    min-height:100vh;
  }

  /* ── Ambient background: deep gradient + gold flares + constellation ── */
  .bg-layer{position:fixed;inset:0;z-index:-2;
    background:
      radial-gradient(1100px 600px at 50% -8%, #15203b 0%, transparent 60%),
      radial-gradient(900px 700px at 100% 100%, #11182c 0%, transparent 55%),
      linear-gradient(180deg,var(--bg) 0%,var(--bg-2) 50%,var(--bg) 100%);
  }
  .flare{position:fixed;z-index:-1;pointer-events:none;filter:blur(40px);opacity:.55;}
  .flare.top{top:-120px;left:50%;transform:translateX(-50%);width:680px;height:240px;
    background:radial-gradient(ellipse at center,rgba(212,175,55,.35),transparent 70%);}
  .flare.sweep{bottom:6%;left:-10%;width:130%;height:160px;opacity:.4;
    background:linear-gradient(90deg,transparent,rgba(246,231,172,.5) 45%,rgba(212,175,55,.35) 55%,transparent);
    transform:rotate(-4deg);}
  .constellation{position:fixed;inset:0;z-index:-1;opacity:.4;pointer-events:none;}

  .wrap{max-width:680px;margin:0 auto;padding:38px 20px 70px;position:relative;}

  /* ── HERO ── */
  .hero{text-align:center;}
  .welcome{font-family:"Outfit",sans-serif;font-weight:300;font-style:italic;
    color:var(--silver-dim);letter-spacing:.18em;font-size:.95rem;
    text-transform:lowercase;margin-bottom:2px;}
  .crown{display:block;margin:0 auto 14px;width:240px;height:auto;filter:drop-shadow(0 0 18px rgba(212,175,55,.45));}

  /* ── Premium banner ── */
  .banner{margin:26px auto 34px;max-width:560px;text-align:center;
    padding:18px 22px;border-radius:14px;
    border:1.5px solid var(--purple);
    background:linear-gradient(180deg,rgba(139,92,246,.10),rgba(20,16,40,.4));
    box-shadow:0 0 28px var(--purple-glow),inset 0 0 22px rgba(139,92,246,.18);}
  .banner h1{font-family:"Cinzel",serif;font-weight:800;direction:ltr;
    font-size:clamp(1.15rem,4.4vw,1.6rem);letter-spacing:.05em;
    background:linear-gradient(180deg,#fff,#c8cedb 60%,#8b93a7);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    line-height:1.25;}
  .banner .sub{font-family:"Cinzel",serif;font-weight:600;direction:ltr;
    color:var(--gold-light);letter-spacing:.22em;font-size:.95rem;margin-top:4px;
    text-shadow:0 0 12px rgba(212,175,55,.4);}


  /* ── Features (trust row) ── */
  .feature-head{text-align:center;margin:8px 0 16px;}
  .feature-head .pill{display:inline-block;font-weight:800;color:#1a1407;
    background:linear-gradient(180deg,var(--gold-light),var(--gold));
    padding:7px 22px;border-radius:999px;font-size:.95rem;letter-spacing:.02em;
    box-shadow:0 6px 18px rgba(212,175,55,.35);}
  .features{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:40px;}
  .feat{flex:1 1 100px;min-width:96px;max-width:120px;text-align:center;
    padding:16px 8px;border-radius:16px;background:var(--panel);
    border:1px solid var(--panel-edge);transition:.25s;}
  .feat:hover{transform:translateY(-3px);border-color:var(--gold);}
  .feat .coin{width:46px;height:46px;margin:0 auto 9px;border-radius:50%;
    display:grid;place-items:center;font-size:1.3rem;
    background:radial-gradient(circle at 35% 30%,#f6e7ac,#caa636 55%,#7a5e15);
    color:#2a1f06;box-shadow:0 4px 12px rgba(0,0,0,.5),inset 0 1px 2px rgba(255,255,255,.6);}
  .feat span{display:block;font-size:.78rem;font-weight:700;color:var(--silver);line-height:1.4;}

  /* ── SOCIAL LINKS ── */
  .links-head{text-align:center;margin-bottom:18px;}
  .links-head h2{font-family:"Cinzel",serif;font-weight:700;direction:ltr;
    color:var(--gold-light);letter-spacing:.06em;font-size:1.25rem;
    text-shadow:0 0 16px rgba(212,175,55,.35);}
  .links-head p{color:var(--muted);font-size:.9rem;margin-top:4px;}
  .links{display:flex;flex-direction:column;gap:13px;max-width:420px;margin:0 auto;}
  .btn{display:flex;align-items:center;gap:14px;direction:ltr;
    padding:15px 20px;border-radius:14px;text-decoration:none;
    font-family:"Outfit",sans-serif;font-weight:600;font-size:1.02rem;color:#fff;
    background:var(--panel);border:1px solid var(--panel-edge);
    box-shadow:0 8px 22px rgba(0,0,0,.4);
    transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;}
  .btn:hover{transform:translateY(-3px);border-color:var(--gold);
    box-shadow:0 14px 30px rgba(0,0,0,.5),0 0 18px rgba(212,175,55,.25);}
  .btn:active{transform:translateY(-1px);}
  .btn .icon{width:34px;height:34px;flex:0 0 34px;display:grid;place-items:center;
    border-radius:9px;}
  .btn .icon i{font-size:20px;color:#fff;}
  .btn .label{flex:1;}
  .btn .arrow{color:var(--gold);font-size:1.1rem;opacity:.7;transition:.2s;}
  .btn:hover .arrow{opacity:1;transform:translateX(4px);}
  /* brand icon tints */
  .ic-tiktok{background:#000;border:1px solid rgba(255,255,255,.15);}
  .ic-instagram{background:linear-gradient(45deg,#f09433,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888);}
  .ic-facebook{background:#1877f2;}
  .ic-whatsapp{background:#25d366;}

  /* ── Footer ── */
  footer{margin-top:48px;text-align:center;}
  .footer-tags{display:flex;justify-content:center;gap:26px;flex-wrap:wrap;
    font-family:"Cinzel",serif;direction:ltr;font-weight:600;letter-spacing:.14em;
    color:var(--silver);font-size:.92rem;}
  .footer-tags span{position:relative;}
  .footer-tags span:not(:last-child)::after{content:"•";position:absolute;
    left:-16px;color:var(--gold);opacity:.6;}
  .footer-note{margin-top:18px;color:var(--muted);font-size:.8rem;direction:ltr;}
  .footer-note a{color:var(--gold);text-decoration:none;}

  @media (max-width:430px){
    .cats{grid-template-columns:1fr;}
    .footer-tags{gap:22px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;scroll-behavior:auto;}
  }
</style>
</head>
